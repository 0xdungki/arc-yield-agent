<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <defs>
    <radialGradient id="g1" cx="20%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#A37A3A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F5F1EA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="100%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#2C4A3E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F5F1EA" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grain" patternUnits="userSpaceOnUse" width="160" height="160">
      <rect width="160" height="160" fill="#F5F1EA"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#F5F1EA"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Top bar dot -->
  <circle cx="80" cy="80" r="6" fill="#2C4A3E"/>
  <text x="100" y="85" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#3A3833" letter-spacing="2.5">ARC TESTNET · LIVE</text>

  <!-- Brand -->
  <g transform="translate(80, 160)">
    <circle cx="22" cy="22" r="22" fill="#1B1A17"/>
    <path d="M9 33 L22 13 L35 33" stroke="#F5F1EA" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="22" cy="22" r="2.4" fill="#F5F1EA"/>
    <text x="62" y="30" font-family="Fraunces, serif" font-size="22" font-weight="500" fill="#1B1A17">Arc Yield Agent</text>
  </g>

  <!-- Headline -->
  <text x="80" y="320" font-family="Fraunces, serif" font-size="92" font-weight="400" fill="#1B1A17" letter-spacing="-2">Quiet capital,</text>
  <text x="80" y="420" font-family="Fraunces, serif" font-style="italic" font-weight="300" font-size="92" fill="#7A5826" letter-spacing="-2">working continuously.</text>

  <!-- Subhead -->
  <text x="80" y="490" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#3A3833">Autonomous stablecoin yield allocator on Arc Testnet.</text>

  <!-- Footer ribbon -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#E2D9CB" stroke-width="1"/>
  <text x="80" y="575" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#A37A3A" letter-spacing="3">BUILT BY @0XDUNGKI</text>
  <text x="1120" y="575" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="14" fill="#6F6A5F">arc-yield-agent.vercel.app</text>
